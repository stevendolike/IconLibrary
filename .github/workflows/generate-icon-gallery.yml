name: Generate Icon Gallery MD

on:
  push:
    paths:
      - 'Emby-Icon.json'   # JSON 更新後自動觸發
  workflow_dispatch:

jobs:
  generate-md:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Generate Emby-Icons.md
        run: |
          python3 << 'PYEOF'
          import json
          from pathlib import Path
          from collections import defaultdict

          with open("Emby-Icon.json", encoding="utf-8") as f:
              data = json.load(f)

          icons = data.get("icons", [])
          description = data.get("description", "")
          today = description.split("更新时间：")[-1].split("｜")[0] if "更新时间：" in description else ""

          # 按 name 分組（同名的放同一行）
          groups = defaultdict(list)
          for icon in icons:
              groups[icon["name"]].append(icon["url"])

          lines = []
          lines.append("# Emby Icon Gallery\n")
          lines.append(f"> 更新時間：{today}　｜　共 **{len(groups)}** 個圖標，**{len(icons)}** 個變體\n")
          lines.append("---\n")

          # 表頭
          lines.append("| Name | Icons |")
          lines.append("|------|-------|")

          for name, urls in groups.items():
              imgs = " ".join(
                  f'<img src="{url}" width="60" title="{name}" />'
                  for url in urls
              )
              lines.append(f"| `{name}` | {imgs} |")

          lines.append("")
          lines.append("---")
          lines.append(f"*Auto-generated from [Emby-Icon.json](./Emby-Icon.json)*")

          with open("Emby-Icons.md", "w", encoding="utf-8") as f:
              f.write("\n".join(lines))

          print(f"Generated Emby-Icons.md: {len(groups)} names, {len(icons)} icons total")
          PYEOF

      - name: Commit Emby-Icons.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Emby-Icons.md
          git diff --cached --quiet || \
            git commit -m "chore: update Emby-Icons.md [$(date '+%Y-%m-%d')]"
          git push
