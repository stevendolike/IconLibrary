name: Update Emby-Icon JSON

on:
  push:
    paths:
      - 'Emby/**.png'
  workflow_run:
    workflows: ["Sync Upstream Emby Icons"]
    types:
      - completed

jobs:
  update-json:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Get today's date
        id: date
        run: echo "date=$(date '+%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Generate Emby-Icon.json and Emby-Icons.md
        run: |
          python3 << 'PYEOF'
          import os, json, re
          from pathlib import Path
          from collections import defaultdict

          repo = "stevendolike/IconLibrary"
          base_url = f"https://raw.githubusercontent.com/{repo}/main/Emby"
          today = os.environ.get("TODAY", "")

          # ── 置頂圖標清單（依序排列，檔名為 key）────────────────────
          PINNED = [
              ("AList",                          "AList.png"),
              ("OpenList",                       "OpenList.png"),
              ("Emby",                           "Emby.png"),
              ("Jellyfin",                       "Jellyfin.png"),
              ("Plex",                           "Plex.png"),
              ("115",                            "115.png"),
              ("123",                            "123.png"),
              ("Alipan",                         "Alipan.png"),
              ("BaiduNetDisk",                   "BaiduNetDisk.png"),
              ("GoogleDrive",                    "GoogleDrive.png"),
              ("OneDrive",                       "OneDrive.png"),
              ("PikPak",                         "PikPak.png"),
              ("fnOS",                           "fnOS.png"),
              ("RottenTomatoes Fresh",           "RottenTomatoes_Fresh.png"),
              ("RottenTomatoes Rotten",          "RottenTomatoes_Rotten.png"),
              ("RottenTomatoes PositiveAudience","RottenTomatoes_PositiveAudience.png"),
              ("RottenTomatoes NegativeAudience","RottenTomatoes_NegativeAudience.png"),
              ("Emby",                           "DIYEmby-01.png"),
              ("Emby",                           "DIYEmby-02.png"),
          ]
          pinned_filenames = {filename for _, filename in PINNED}

          # ── 1. 讀取現有 name mapping ──────────────────────────────
          existing_path = Path("Emby-Icon.json")
          existing_map = {}  # filename -> name

          if existing_path.exists():
              with open(existing_path) as f:
                  existing_data = json.load(f)
              for entry in existing_data.get("icons", []):
                  basename = entry["url"].rsplit("/", 1)[-1]
                  existing_map[basename] = entry["name"]

          # ── 2. 掃描 Emby/ 所有 PNG ────────────────────────────────
          emby_dir = Path("Emby")
          all_pngs = {p.name for p in emby_dir.glob("*.png")}

          # ── 3. 置頂部分（只加入實際存在的檔案）──────────────────────
          icons = []
          for name, filename in PINNED:
              if filename in all_pngs:
                  icons.append({
                      "name": name,
                      "url": f"{base_url}/{filename}"
                  })

          # ── 4. 其餘按字母排序接在後面 ─────────────────────────────
          rest = sorted(all_pngs - pinned_filenames, key=lambda s: s.lower())
          for filename in rest:
              if filename in existing_map:
                  name = existing_map[filename]
              else:
                  name = re.sub(r'-\d+$', '', Path(filename).stem)
              icons.append({
                  "name": name,
                  "url": f"{base_url}/{filename}"
              })

          # ── 5. 寫入 Emby-Icon.json ────────────────────────────────
          output = {
              "name": "Emby图标库",
              "description": f"stevendolike｜更新时间：{today}｜部分图标来源于 sooyaaabo/IconLibrary",
              "icons": icons
          }
          with open("Emby-Icon.json", "w", encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False, indent=4)

          print(f"Generated Emby-Icon.json: {len(icons)} icons ({len(PINNED)} pinned + {len(rest)} others)")

          # ── 6. 生成 Emby-Icons.md ─────────────────────────────────
          # 保持順序，同名合併；RottenTomatoes 系列合併成一行
          ordered_groups = {}
          for icon in icons:
              n = icon["name"]
              # RottenTomatoes 開頭的統一歸到 "RottenTomatoes" 這個 display key
              display_key = "RottenTomatoes" if n.startswith("RottenTomatoes") else n
              if display_key not in ordered_groups:
                  ordered_groups[display_key] = []
              if icon["url"] not in ordered_groups[display_key]:
                  ordered_groups[display_key].append((n, icon["url"]))

          lines = []
          lines.append("# Emby Icon Gallery\n")
          lines.append(f"> 更新時間：{today}　｜　共 **{len(icons)}** 個圖標\n")
          lines.append("---\n")
          lines.append("| Name | Icons |")
          lines.append("|------|-------|")

          for display_key, entries in ordered_groups.items():
              imgs = " ".join(
                  f'<img src="{url}" width="60" title="{name}" />'
                  for name, url in entries
              )
              lines.append(f"| `{display_key}` | {imgs} |")

          lines.append("")
          lines.append("---")
          lines.append(f"*Auto-generated from [Emby-Icon.json](./Emby-Icon.json)*")

          with open("Emby-Icons.md", "w", encoding="utf-8") as f:
              f.write("\n".join(lines))

          print(f"Generated Emby-Icons.md: {len(ordered_groups)} names")
          PYEOF
        env:
          TODAY: ${{ steps.date.outputs.date }}

      - name: Commit JSON + MD
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Emby-Icon.json Emby-Icons.md
          git diff --cached --quiet || \
            git commit -m "chore: update icons & gallery [$(date '+%Y-%m-%d')]"
          git push
