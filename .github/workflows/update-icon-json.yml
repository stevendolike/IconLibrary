name: Update Emby-Icon JSON

on:
  push:
    paths:
      - 'Emby/**.png'
  workflow_run:
    workflows: ["Sync Upstream Emby Icons"]
    types:
      - completed

jobs:
  update-json:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Get today's date
        id: date
        run: echo "date=$(date '+%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Generate Emby-Icon.json and Emby-Icons.md
        run: |
          python3 << 'PYEOF'
          import os, json, re
          from pathlib import Path
          from collections import defaultdict

          repo = "stevendolike/IconLibrary"
          base_url = f"https://raw.githubusercontent.com/{repo}/main/Emby"
          today = os.environ.get("TODAY", "")

          # ── 1. 讀取現有 name mapping ──────────────────────────────
          existing_path = Path("Emby-Icon.json")
          existing_map = {}  # filename -> name

          if existing_path.exists():
              with open(existing_path) as f:
                  existing_data = json.load(f)
              for entry in existing_data.get("icons", []):
                  basename = entry["url"].rsplit("/", 1)[-1]
                  existing_map[basename] = entry["name"]

          # ── 2. 掃描 Emby/ 所有 PNG ────────────────────────────────
          emby_dir = Path("Emby")
          png_files = sorted(emby_dir.glob("*.png"), key=lambda p: p.name.lower())

          icons = []
          for png in png_files:
              filename = png.name
              if filename in existing_map:
                  name = existing_map[filename]
              else:
                  name = re.sub(r'-\d+$', '', png.stem)

              icons.append({
                  "name": name,
                  "url": f"{base_url}/{filename}"
              })

          # ── 3. 寫入 Emby-Icon.json ────────────────────────────────
          output = {
              "name": "Emby图标库",
              "description": f"stevendolike｜更新时间：{today}｜部分图标来源于 sooyaaabo/IconLibrary",
              "icons": icons
          }
          with open("Emby-Icon.json", "w", encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False, indent=4)

          print(f"Generated Emby-Icon.json with {len(icons)} icons")

          # ── 4. 生成 Emby-Icons.md ─────────────────────────────────
          # 按 name 分組，同名的並排顯示
          groups = defaultdict(list)
          for icon in icons:
              groups[icon["name"]].append(icon["url"])

          lines = []
          lines.append("# Emby Icon Gallery\n")
          lines.append(f"> 更新時間：{today}　｜　共 **{len(groups)}** 個圖標，**{len(icons)}** 個變體\n")
          lines.append("---\n")
          lines.append("| Name | Icons |")
          lines.append("|------|-------|")

          for name, urls in groups.items():
              imgs = " ".join(
                  f'<img src="{url}" width="60" title="{name}" />'
                  for url in urls
              )
              lines.append(f"| `{name}` | {imgs} |")

          lines.append("")
          lines.append("---")
          lines.append(f"*Auto-generated from [Emby-Icon.json](./Emby-Icon.json)*")

          with open("Emby-Icons.md", "w", encoding="utf-8") as f:
              f.write("\n".join(lines))

          print(f"Generated Emby-Icons.md: {len(groups)} names, {len(icons)} total")
          PYEOF
        env:
          TODAY: ${{ steps.date.outputs.date }}

      - name: Commit JSON + MD
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Emby-Icon.json Emby-Icons.md
          git diff --cached --quiet || \
            git commit -m "chore: update icons & gallery [$(date '+%Y-%m-%d')]"
          git push
